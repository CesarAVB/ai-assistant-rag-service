# =====================================
# OPENAI
# =====================================
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

# =====================================
# PGVECTOR
# =====================================
spring.datasource.url=${PGVECTOR_URL}
spring.datasource.username=${PGVECTOR_USERNAME}
spring.datasource.password=${PGVECTOR_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# =====================================
# AUTH - Senha simples para portfólio
# =====================================
# Altere estes valores antes de subir para produção
app.auth.password=${APP_AUTH_PASSWORD}
app.auth.token=${APP_AUTH_TOKEN}

# ============================================
# CORS Configuration
# ============================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}